services:
  app:
    build: .
    ports:
      - "3000:3000"
    env_file:
      - .env.production.example
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: borderless_payroll
      POSTGRES_USER: borderless
      POSTGRES_PASSWORD: borderless_local_change_me
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U borderless -d borderless_payroll"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
