name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/borderless_ci
      NEXT_PUBLIC_SUPABASE_URL: http://localhost:54321
      SUPABASE_SERVICE_ROLE_KEY: ci-placeholder
      NEXT_PUBLIC_SOLANA_RPC_URL: https://api.devnet.solana.com
      TREASURY_WALLET_ADDRESS: 11111111111111111111111111111111
      ESCROW_PROGRAM_ID: 9MtY5vEpJCf31Ak19wfJ25Ef5bdVvs9nzoxeh3yEf4FB
      HELIUS_WEBHOOK_SECRET: ci-placeholder
      DODO_WEBHOOK_SECRET: ci-placeholder
      APP_ORIGIN: http://localhost:3000
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: borderless_ci
          POSTGRES_PASSWORD: postgres
          POSTGRES_USER: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npx prisma generate
      - run: npx prisma migrate diff --from-empty --to-schema prisma/schema.prisma --script > /tmp/phase3-migration.sql
      - run: npm run typecheck
      - run: npm test
      - run: npm run build

  anchor:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Install Anchor CLI
        run: npm install -g @coral-xyz/anchor-cli
      - run: npm run anchor:build
